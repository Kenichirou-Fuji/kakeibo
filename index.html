<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>家計簿アプリ</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<header>💰 家計簿アプリ</header>

<nav>
  <button class="active" onclick="switchTab('register', this)">📝 登録</button>
  <button onclick="switchTab('view', this)">📋 閲覧</button>
  <button onclick="switchTab('deposit', this)">🏦 入金額</button>
</nav>

<!-- ── 登録画面 ── -->
<div id="page-register" class="page active">
  <div class="card">
    <h2>支出を登録する</h2>
    <form id="registerForm">
      <div class="form-grid">
        <div class="form-group">
          <label for="date">📅 日付</label>
          <input type="date" id="date" required />
        </div>
        <div class="form-group">
          <label for="amount">💴 金額（円）</label>
          <input type="number" id="amount" placeholder="1000" min="0" required />
        </div>
        <div class="form-group">
          <label for="purpose">👤 用途（誰が使うか）</label>
          <select id="purpose" required>
            <option value="personal">個人用</option>
            <option value="family">家族用</option>
          </select>
        </div>
        <div class="form-group">
          <label for="wallet">💳 財布（どの財布から）</label>
          <select id="wallet" required>
            <option value="personal">私の財布</option>
            <option value="family">共有財布</option>
          </select>
        </div>
        <div class="form-group">
          <label for="memo">📝 メモ</label>
          <input type="text" id="memo" placeholder="例：スーパーでの買い物" />
        </div>
      </div>
      <button type="submit" class="btn-primary">＋ 登録する</button>
    </form>
  </div>
</div>

<!-- ── 入金額計算画面 ── -->
<div id="page-deposit" class="page">
  <div class="card">
    <h2>毎月の入金額を計算する</h2>
    <div class="form-grid deposit-form-grid">
      <div class="form-group">
        <label for="depositMonth">📅 対象月</label>
        <input type="month" id="depositMonth" />
      </div>
      <div class="form-group">
        <label for="baseDepositAmount">💴 基本入金額（円）</label>
        <input type="number" id="baseDepositAmount" min="0" step="1000" placeholder="180000" />
      </div>
    </div>
    <p class="deposit-description">
      計算式: 基本入金額 ＋ 共有財布で払った個人用 － 私の財布で払った家族用
    </p>
  </div>

  <div class="summary deposit-summary">
    <div class="summary-box">
      <div class="label">基本入金額</div>
      <div class="amount" id="depositBaseTotal">¥0</div>
    </div>
    <div class="summary-box">
      <div class="label">共有財布で払った個人用</div>
      <div class="amount deposit-plus" id="depositFamilyPersonal">¥0</div>
    </div>
    <div class="summary-box">
      <div class="label">私の財布で払った家族用</div>
      <div class="amount deposit-minus" id="depositPersonalFamily">¥0</div>
    </div>
    <div class="summary-box deposit-result-box">
      <div class="label">今月の入金額</div>
      <div class="amount" id="depositRecommendedTotal">¥0</div>
    </div>
  </div>

  <div class="list-card deposit-card">
    <div class="deposit-formula" id="depositFormula">¥0 + ¥0 - ¥0 = ¥0</div>
    <div class="deposit-status" id="depositStatus"></div>
    <div class="deposit-check-row">
      <label class="deposit-check-label">
        <input type="checkbox" id="depositCompletedCheckbox" />
        <span>この月の入金は完了した</span>
      </label>
      <div class="deposit-check-meta" id="depositCompletedMeta">未入金</div>
    </div>
    <div class="deposit-breakdown">
      <div class="deposit-breakdown-row">
        <span>共有財布 → 個人用 の件数</span>
        <strong id="familyPersonalCount">0件</strong>
      </div>
      <div class="deposit-breakdown-row">
        <span>私の財布 → 家族用 の件数</span>
        <strong id="personalFamilyCount">0件</strong>
      </div>
      <div class="deposit-breakdown-row">
        <span>対象月の登録件数</span>
        <strong id="depositMonthEntryCount">0件</strong>
      </div>
    </div>
    <div class="deposit-detail-grid">
      <section class="deposit-detail-section">
        <h3>共有財布で払った個人用</h3>
        <div id="depositFamilyPersonalList" class="deposit-detail-list"></div>
      </section>
      <section class="deposit-detail-section">
        <h3>私の財布で払った家族用</h3>
        <div id="depositPersonalFamilyList" class="deposit-detail-list"></div>
      </section>
    </div>
  </div>
</div>

<!-- ── 閲覧画面 ── -->
<div id="page-view" class="page">
  <div class="summary">
    <div class="summary-box">
      <div class="label">今月の合計</div>
      <div class="amount" id="monthTotal">¥0</div>
    </div>
    <div class="summary-box">
      <div class="label">全期間の合計</div>
      <div class="amount" id="allTotal">¥0</div>
    </div>
    <div class="summary-box">
      <div class="label">登録件数</div>
      <div class="amount" id="totalCount">0件</div>
    </div>
  </div>

  <div class="filters"><select id="filterPurpose" onchange="renderList()">
      <option value="">すべての用途</option>
      <option value="personal">個人用</option>
      <option value="family">家族用</option>
    </select>
    <select id="filterWallet" onchange="renderList()">
      <option value="">すべての財布</option>
      <option value="personal">私の財布</option>
      <option value="family">共有財布</option>
    </select>
    <input type="month" id="filterMonth" onchange="renderList()" />
  </div>

  <div class="list-card">
    <div id="mobileList" class="mobile-list"></div>
    <table id="desktopTable">
      <thead>
         <tr>
          <th>日付</th>
          <th>用途</th>
          <th>財布</th>
          <th>金額</th>
          <th>メモ</th>
          <th></th>
         </tr>
       </thead>
      <tbody id="entryList"></tbody>
    </table>
    <div id="emptyState" class="empty-state" style="display:none;">データがありません</div>
  </div>
</div>

<!-- ── 編集モーダル ── -->
<div class="modal-overlay" id="editModal">
  <div class="modal">
    <h2>✏️ 編集する</h2>
    <div class="form-grid">
      <div class="form-group">
        <label>日付</label>
        <input type="date" id="editDate" required />
      </div>
      <div class="form-group">
        <label>金額（円）</label>
        <input type="number" id="editAmount" min="0" required />
      </div>
      <div class="form-group">
        <label>用途（誰が使うか）</label>
        <select id="editPurpose">
          <option value="personal">個人用</option>
          <option value="family">家族用</option>
        </select>
      </div>
      <div class="form-group">
        <label>財布（どの財布から）</label>
        <select id="editWallet">
          <option value="personal">私の財布</option>
          <option value="family">共有財布</option>
        </select>
      </div>
      <div class="form-group">
        <label>メモ</label>
        <input type="text" id="editMemo" />
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">キャンセル</button>
      <button class="btn-save" onclick="saveEdit()">保存する</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- Firebase SDK (compat版) -->
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
<script src="firebase-config.js"></script>
<script src="app.js"></script>
</body>
</html>
